<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <!--
    This page is served from GitHub Pages (https://sapo-dorado.github.io/Choreo/player.html)
    so that YouTube embeds receive a proper HTTP Referer header — YouTube rejects embeds
    loaded from inline HTML blobs (no Referer) with Error 153.
  -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    #player iframe {
      width: 100% !important;
      height: 100% !important;
      border: none;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var videoId = params.get('v');

    var ytPlayer;
    var pendingRate = 1;
    var pendingMirror = false;

    function applyRate(rate) {
      pendingRate = rate;
      if (ytPlayer && ytPlayer.setPlaybackRate) {
        ytPlayer.setPlaybackRate(rate);
      }
    }

    function applyMirror(mirrored) {
      pendingMirror = mirrored;
      var iframe = document.querySelector('#player iframe');
      if (iframe) {
        iframe.style.transform = mirrored ? 'scaleX(-1)' : 'none';
      }
    }

    window._choreo = { setRate: applyRate, setMirror: applyMirror };

    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function() {
      ytPlayer = new YT.Player('player', {
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 1,
          rel: 0,
          playsinline: 1,
          modestbranding: 1,
          origin: window.location.origin,
          fs: 1
        },
        events: {
          onReady: function(e) {
            e.target.playVideo();
            applyRate(pendingRate);
            applyMirror(pendingMirror);
          }
        }
      });
    };
  </script>
</body>
</html>
